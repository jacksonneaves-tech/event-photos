<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Gallery</title>

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }

    .grid img {
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
      object-fit: cover;
    }

    .full {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .full img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
    }
  </style>
</head>

<body style="background-image: url('bg-home.png');">

  <div class="card">
    <h1>Gallery</h1>
    <h2>Photos uploaded so far</h2>
<div class="filter-buttons">
  <button class="btn" data-filter="welcome">Welcome Drinks</button>
  <button class="btn" data-filter="wedding">Ceremony & Reception</button>
  <button class="btn" data-filter="recovery">Recovery Drinks</button>
</div>

    <div id="gallery" class="grid"></div>

    <button onclick="downloadAll()">Download all images</button>
  </div>

  <div id="fullView" class="full" style="display:none;" onclick="this.style.display='none'">
    <img id="fullImg">
  </div>

<script>
let allPhotos = [];

async function loadPhotos() {
  const res = await fetch("https://super-base-a55bevent-photo-uploader.jackson-neaves.workers.dev/list");
  allPhotos = await res.json();
  // Do NOT render here — wait for a filter click
}

function renderPhotos(list) {
  const container = document.getElementById('gallery');
  container.innerHTML = '';

  list.forEach(photo => {
    const img = document.createElement('img');
    img.src = photo.url;
    img.onclick = () => openFull(photo.url);
    container.appendChild(img);
  });
}

document.querySelectorAll('.filter-buttons .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const suffix = '_' + btn.dataset.filter + '/';
    const filtered = allPhotos.filter(p => p.key.includes(suffix));
    renderPhotos(filtered);
  });
});

function openFull(url) {
  document.getElementById("fullImg").src = url;
  document.getElementById("fullView").style.display = "flex";
}

function downloadAll() {
  window.location.href = "https://super-base-a55bevent-photo-uploader.jackson-neaves.workers.dev/download-all";
}

loadPhotos();
</script>


</body>
</html>
