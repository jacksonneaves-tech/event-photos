<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Event Photo Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }
    p {
      color: #555;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    input[type="text"],
    input[type="file"] {
      margin-top: 6px;
      width: 100%;
      font-size: 0.95rem;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    .status {
      margin-top: 12px;
      font-size: 0.9rem;
    }
    .status.success {
      color: #15803d;
    }
    .status.error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Your Event Photos</h1>
    <p>Please enter your name and select up to 20 photos.</p>

    <form id="upload-form">
      <label for="name">Your name</label>
      <input id="name" name="name" type="text" required />

      <label for="photos">Photos (max 20)</label>
      <input id="photos" name="photos" type="file" accept="image/*" multiple required />

      <button type="submit" id="submit-btn">Upload</button>
      <div id="status" class="status"></div>
    </form>
  </div>

  <script>
    const WORKER_URL = 'https://event-photo-uploader.<your-subdomain>.workers.dev/upload';

    const form = document.getElementById('upload-form');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');
    const photosInput = document.getElementById('photos');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = '';
      statusEl.className = 'status';

      const files = photosInput.files;
      if (!files || files.length === 0) {
        statusEl.textContent = 'Please select at least one photo.';
        statusEl.classList.add('error');
        return;
      }
      if (files.length > 20) {
        statusEl.textContent = 'You can upload a maximum of 20 photos.';
        statusEl.classList.add('error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Uploading...';

      const formData = new FormData(form);

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || 'Upload failed');
        }

        const data = await res.json();
        statusEl.textContent = `Upload complete. ${data.count} photo(s) received.`;
        statusEl.classList.add('success');
        form.reset();
      } catch (err) {
        statusEl.textContent = 'Upload failed. Please try again.';
        statusEl.classList.add('error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Upload';
      }
    });
  </script>
</body>
</html>
