<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Sarah & Damian&#8217;s Wedding
</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url('bg-home.png');">

  <div class="card">
    <h1>Sarah & Damian&#8217;s Wedding</h1>
    <h2>Please enter your name below to upload photos of today&#8217;s event</h2>

    <input id="name" type="text" class="text-input" placeholder="Your name">

    <button onclick="goNext()">Continue</button>
  </div>

  <script>
    function goNext() {
      const name = document.getElementById('name').value.trim();
      if (!name) return alert("Please enter your name");

      localStorage.setItem("uploaderName", name);
      window.location.href = "categories.html";
    }
  </script>

</body>
</html>
