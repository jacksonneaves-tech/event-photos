<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Upload Photos</title>
  <link rel="stylesheet" href="style.css">
</head>

<body id="bg">

  <div class="card">
    <h1 id="title"></h1>
    <h2>Upload up to 20 photos</h2>

    <!-- ⭐ REPLACE THIS ⭐ -->
    <!-- <input id="photos" type="file" accept="image/*" multiple> -->

    <!-- ⭐ WITH THIS (Step 2) ⭐ -->
    <div class="file-picker">
      Choose Photos
      <input id="photos" type="file" accept="image/*" multiple>
    </div>

    <p id="file-label">No files selected</p>
    <!-- ⭐ END OF INSERT ⭐ -->

    <button onclick="upload()">Upload Photos</button>

    <p id="status" style="color:white; margin-top:12px;"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cat = params.get("cat");
    const name = localStorage.getItem("uploaderName") || "guest";

    const bg = document.getElementById("bg");
    const title = document.getElementById("title");

    // Set background + title based on category
    if (cat === "welcome") {
      bg.style.backgroundImage = "url('bg-welcome.png')";
      title.textContent = "Welcome Drinks";
    } else if (cat === "wedding") {
      bg.style.backgroundImage = "url('bg-wedding.png')";
      title.textContent = "Wedding & Reception";
    } else {
      bg.style.backgroundImage = "url('bg-recovery.png')";
      title.textContent = "Recovery Drinks";
    }

    // ⭐ Step 3 JS for updating the label ⭐
    const photosInput = document.getElementById("photos");
    const fileLabel = document.getElementById("file-label");

    photosInput.addEventListener("change", () => {
      if (photosInput.files.length === 0) {
        fileLabel.textContent = "No files selected";
      } else if (photosInput.files.length === 1) {
        fileLabel.textContent = photosInput.files[0].name;
      } else {
        fileLabel.textContent = photosInput.files.length + " files selected";
      }
    });

    async function upload() {
  const files = document.getElementById("photos").files;
  const status = document.getElementById("status");

  if (files.length === 0) return alert("Select at least one photo");
  if (files.length > 20) return alert("Max 20 photos");

  // Show uploading message immediately
  status.textContent = "Uploading photos, please wait...";

  const form = new FormData();
  form.append("name", name + "_" + cat);

  for (const f of files) form.append("photos", f);

  const res = await fetch("https://super-base-a55bevent-photo-uploader.jackson-neaves.workers.dev/upload", {
    method: "POST",
    body: form
  });

  // Replace message when done
  status.textContent = res.ok ? "Upload complete!" : "Upload failed";
}

  </script>
<script>
  const uploader = localStorage.getItem("uploaderName");
  const isHarryStyles = uploader === "harry-styles";

  if (isHarryStyles) {
    for (let i = 0; i < 5; i++) {
      const img = document.createElement("img");
      img.src = "harry.png"; // place harry.png in the same folder as your HTML
      img.style.position = "fixed";
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.left = Math.random() * window.innerWidth + "px";
      img.style.top = Math.random() * window.innerHeight + "px";
      img.style.pointerEvents = "none";
      img.style.zIndex = "9999";

      document.body.appendChild(img);

      let dx = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);
      let dy = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);

      function animate() {
        const x = img.offsetLeft + dx;
        const y = img.offsetTop + dy;

        if (x <= 0 || x >= window.innerWidth - 80) dx *= -1;
        if (y <= 0 || y >= window.innerHeight - 80) dy *= -1;

        img.style.left = x + "px";
        img.style.top = y + "px";

        requestAnimationFrame(animate);
      }

      animate();
    }
  }
</script>

</body>
</html>
