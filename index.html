<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Sarah & Damian&#8217;s Wedding</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url('bg-home.png');">

  <div class="card">
    <h1>Sarah & Damian&#8217;s Wedding</h1>
    <h2>Please enter your name below to upload photos of today&#8217;s event</h2>

    <!-- Two separate fields -->
    <input id="firstName" type="text" class="text-input" placeholder="First name">
    <input id="lastName" type="text" class="text-input" placeholder="Last name">

    <button onclick="goNext()">Continue</button>
  </div>

  <script>
    function goNext() {
      const first = document.getElementById("firstName").value.trim();
      const last = document.getElementById("lastName").value.trim();

      if (!first || !last) {
        alert("Please enter both first and last names");
        return;
      }

      // Normalise the name
      const normalised = (first + " " + last)
        .toLowerCase()
        .replace(/\s+/g, " ")   // collapse multiple spaces
        .replace(/ /g, "-");    // replace space with hyphen

      localStorage.setItem("uploaderName", normalised);

      // Continue to categories page
      window.location.href = "categories.html";
    }
  </script>
<script>
  const uploader = localStorage.getItem("uploaderName");
  const isHarryStyles = uploader === "harry-styles";

  if (isHarryStyles) {
    for (let i = 0; i < 5; i++) {
      const img = document.createElement("img");
      img.src = "harry.png"; // place harry.png in the same folder as your HTML
      img.style.position = "fixed";
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.left = Math.random() * window.innerWidth + "px";
      img.style.top = Math.random() * window.innerHeight + "px";
      img.style.pointerEvents = "none";
      img.style.zIndex = "9999";

      document.body.appendChild(img);

      let dx = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);
      let dy = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);

      function animate() {
        const x = img.offsetLeft + dx;
        const y = img.offsetTop + dy;

        if (x <= 0 || x >= window.innerWidth - 80) dx *= -1;
        if (y <= 0 || y >= window.innerHeight - 80) dy *= -1;

        img.style.left = x + "px";
        img.style.top = y + "px";

        requestAnimationFrame(animate);
      }

      animate();
    }
  }
</script>

</body>
</html>
