<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <title>Select Event</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url('bg-home.png');">

  <div class="card">
    <h1>Choose an Event</h1>

    <a class="btn" href="upload.html?cat=welcome">Welcome Drinks</a>
    <a class="btn" href="upload.html?cat=wedding">Wedding & Reception</a>
    <a class="btn" href="upload.html?cat=recovery">Recovery Drinks</a>

    <!-- This empty div is where the Gallery button will appear -->
    <div id="specialButtons"></div>
  </div>

  <!-- ADD THIS SCRIPT BLOCK -->
  <script>
    // Get the normalised uploader name
    const uploader = localStorage.getItem("uploaderName");

    // Check for special user
    const isSarahRak = uploader === "sarah-rak";
    const isHarryStyles = uploader === "harry-styles";

    // If special user, inject the Gallery button
    if (isSarahRak) {
      document.getElementById("specialButtons").innerHTML = `
        <a class="btn" href="gallery.html">Gallery</a>
      `;
    }
  </script>
<script>
  const uploader = localStorage.getItem("uploaderName");
  const isHarryStyles = uploader === "harry-styles";

  if (isHarryStyles) {
    for (let i = 0; i < 5; i++) {
      const img = document.createElement("img");
      img.src = "harry.png"; // place harry.png in the same folder as your HTML
      img.style.position = "fixed";
      img.style.width = "80px";
      img.style.height = "80px";
      img.style.left = Math.random() * window.innerWidth + "px";
      img.style.top = Math.random() * window.innerHeight + "px";
      img.style.pointerEvents = "none";
      img.style.zIndex = "9999";

      document.body.appendChild(img);

      let dx = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);
      let dy = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? -1 : 1);

      function animate() {
        const x = img.offsetLeft + dx;
        const y = img.offsetTop + dy;

        if (x <= 0 || x >= window.innerWidth - 80) dx *= -1;
        if (y <= 0 || y >= window.innerHeight - 80) dy *= -1;

        img.style.left = x + "px";
        img.style.top = y + "px";

        requestAnimationFrame(animate);
      }

      animate();
    }
  }
</script>

</body>
</html>
