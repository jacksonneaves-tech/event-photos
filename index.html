<!DOCTYPE html>
<html>
<head>
  <title>Sarah & Damien's Wedding</title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="background-image: url('bg-home.png');">

  <div class="card">
    <h1>Sarah & Damien’s Wedding</h1>
    <h2>Please enter your name below to upload photos of today’s event</h2>

    <input id="name" type="text" placeholder="Your name">
    <button onclick="goNext()">Continue</button>
  </div>

  <script>
    function goNext() {
      const name = document.getElementById('name').value.trim();
      if (!name) return alert("Please enter your name");

      localStorage.setItem("uploaderName", name);
      window.location.href = "categories.html";
    }
  </script>

</body>
</html>
